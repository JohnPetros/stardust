name: Web app CD to Coolify

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Coolify
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Coolify deploy
        run: |
          curl -X GET "${{ secrets.COOLIFY_WEBHOOK_WEB_PROD }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_API_TOKEN }}" \
            --fail --silent --show-error

      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          EMBED=$(jq -n \
            --arg ts "$TIMESTAMP" \
            --arg url "$RELEASE_URL" \
            --arg tag "$RELEASE_TAG" \
            '{
              embeds: [{
                title: "✅ Deploy Produção Concluído",
                description: "Uma nova versão do Stardust Web foi implantada em produção com sucesso.",
                url: ($url | .),
                color: 3066993,
                fields: [
                  { name: "🏷️ Release", value: ("[" + ($tag | .) + "](" + ($url | .) + ")"), inline: false }
                ],
                footer: { text: "GitHub Actions • Stardust" },
                timestamp: ($ts | .)
              }]
            }')
          curl -H "Content-Type: application/json" \
            -d "$EMBED" \
            "$DISCORD_WEBHOOK_URL"
