name: Server app CD to Heroku

on:
  push:
    branches:
      - main
    paths:
      - "apps/server/**"
      - "packages/core/**"
      - "packages/validation/**"

permissions:
  id-token: write
  contents: read

jobs:
  migrate-database:
    name: Migrate database
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: aukqejqsiqsqowafpppb

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production database
        working-directory: apps/server
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Apply pending migrations
        working-directory: apps/server
        run: supabase db push

  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    needs:
      - migrate-database
    env:
      HEROKU_APP_NAME: stardust-server-app
      IMAGE_NAME: registry.heroku.com/stardust-server-app/server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: Infisical/secrets-action@v1.0.9
        with:
          method: "oidc"
          identity-id: ${{ secrets.INFISICAL_IDENTITY_ID }}
          domain: ${{ secrets.INFISICAL_DOMAIN }}
          env-slug: "prod"
          project-slug: "stardust-server-app"
          export-type: "file"
          file-output-path: "/apps/server/.env"

      - name: Ensure Heroku find the correct Dockerfile for server app
        run: rm Dockerfile.web && mv Dockerfile.server Dockerfile.web

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container Registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:login

      - name: Set Heroku stack to container
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku stack:set container --app ${{ env.HEROKU_APP_NAME }}

      - name: Build and push Docker image to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:push web -a ${{ env.HEROKU_APP_NAME }} --recursive

      - name: Release to Heroku
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:release -a ${{ env.HEROKU_APP_NAME }} web
