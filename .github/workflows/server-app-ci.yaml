name: Server app CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/server/**"
      - "packages/core/**"
      - "packages/validation/**"
      - "scripts/quality-gate/**"

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  codecheck:
    name: Codecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run codecheck
        run: npm run codecheck -w @stardust/server

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run typecheck -w @stardust/server

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.98.2

      - name: Setup Supabase
        working-directory: apps/server
        run: supabase start

      - name: Rebuild local database from migrations
        working-directory: apps/server
        run: supabase db reset --local --yes

      - name: Create test environment file
        run: |
          printf '%s' "${{ secrets.SERVER_ENV_TEST }}" > apps/server/.env
          printf '%s' "${{ secrets.SERVER_ENV_TEST }}" > apps/server/.env.testing

      - name: Run tests
        run: npm run test:unit -w @stardust/server

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # A catraca roda a suíte unitária (mocks) para medir cobertura. Não sobe
      # Supabase, mas alguns testes (ai tools) leem env no import.
      - name: Create test environment file
        run: printf '%s' "${{ secrets.SERVER_ENV_TEST }}" > apps/server/.env.testing

      - name: Run quality gate
        env:
          QUALITY_GATE_REPORT_FILE: quality-gate-report.md
        run: npm run quality-gate -- --workspace=server

      - name: Comment report on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/quality-gate/comment-pr.sh server quality-gate-report.md

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - codecheck
      - typecheck
      - tests
      - quality-gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build:server
