name: Web app CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/core/**"
      - "packages/validation/**"
      - "packages/lsp/**"
      - "scripts/quality-gate/**"

permissions:
  contents: read

env:
  NODE_VERSION: "22"

jobs:
  codecheck:
    name: Codecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci --prefer-offline --no-audit && exit 0

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "npm ci failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Run codecheck
        run: npm run codecheck -w @stardust/web

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci --prefer-offline --no-audit && exit 0

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "npm ci failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Run typecheck
        run: npm run typecheck -w @stardust/web

  tests:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create environment files
        run: |
          echo "${{ secrets.WEB_ENV_TEST }}" > apps/web/.env.testing

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci --prefer-offline --no-audit && exit 0

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "npm ci failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Run tests
        run: npm run test:unit -w @stardust/web

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create environment files
        run: |
          echo "${{ secrets.WEB_ENV_TEST }}" > apps/web/.env.testing

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci --prefer-offline --no-audit && exit 0

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "npm ci failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run integration tests
        run: npm run test:integration -w @stardust/web

  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci --prefer-offline --no-audit && exit 0

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "npm ci failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Run quality gate
        env:
          QUALITY_GATE_REPORT_FILE: quality-gate-report.md
        run: npm run quality-gate -- --workspace=web

      - name: Comment report on PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: bash scripts/quality-gate/comment-pr.sh web quality-gate-report.md

  build:
    name: Build
    runs-on: ubuntu-latest
    needs:
      - codecheck
      - typecheck
      - tests
      - integration-tests
      - quality-gate

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create environment files
        run: |
          echo "${{ secrets.WEB_ENV_TEST }}" > apps/web/.env

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        shell: bash
        run: |
          for attempt in 1 2 3; do
            npm ci --prefer-offline --no-audit && exit 0

            if [ "$attempt" -eq 3 ]; then
              exit 1
            fi

            echo "npm ci failed on attempt $attempt. Retrying in 15 seconds..."
            sleep 15
          done

      - name: Build project
        run: npm run build:web
